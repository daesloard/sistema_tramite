version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - gotenberg
      - docxtemplater
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/tramites_municipales
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - APP_PDF_GOTENBERG_URL=http://gotenberg:3000/forms/libreoffice/convert
      - APP_DOCXTEMPLATER_URL=http://docxtemplater:3001/render-docx
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: tramites_municipales
    ports:
      - "3306:3306"
  gotenberg:
    image: gotenberg/gotenberg:8-alpine
    ports:
      - "3000:3000"
  docxtemplater:
    build:
      context: .
      dockerfile: Dockerfile.docxtemplater
    ports:
      - "3001:3001"
