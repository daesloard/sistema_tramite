services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8088}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
      docxtemplater:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/tramites_municipales}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-password}
      - APP_PDF_GOTENBERG_URL=${APP_PDF_GOTENBERG_URL:-http://gotenberg:3000/forms/libreoffice/convert}
      - APP_DOCXTEMPLATER_URL=${APP_DOCXTEMPLATER_URL:-http://docxtemplater:3001/render-docx}
      - APP_PDF_GOTENBERG_MAX_ATTEMPTS=${APP_PDF_GOTENBERG_MAX_ATTEMPTS:-3}
      - APP_PDF_GOTENBERG_RETRY_DELAY_MS=${APP_PDF_GOTENBERG_RETRY_DELAY_MS:-500}
      - APP_PDF_GOTENBERG_MAX_DELAY_MS=${APP_PDF_GOTENBERG_MAX_DELAY_MS:-3000}
      - APP_PDF_GOTENBERG_FALLBACK_ENABLED=${APP_PDF_GOTENBERG_FALLBACK_ENABLED:-true}
      - APP_PDF_USE_DOCX4J=${APP_PDF_USE_DOCX4J:-true}
      - APP_DOCXTEMPLATER_MAX_ATTEMPTS=${APP_DOCXTEMPLATER_MAX_ATTEMPTS:-5}
      - APP_DOCXTEMPLATER_RETRY_DELAY_MS=${APP_DOCXTEMPLATER_RETRY_DELAY_MS:-1200}
      - APP_DOCXTEMPLATER_FALLBACK_ENABLED=${APP_DOCXTEMPLATER_FALLBACK_ENABLED:-true}
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tramites_municipales}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
  gotenberg:
    build:
      context: .
      dockerfile: Dockerfile.gotenberg
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  docxtemplater:
    build:
      context: .
      dockerfile: Dockerfile.docxtemplater
    restart: unless-stopped
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
