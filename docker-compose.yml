

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - APP_PDF_GOTENBERG_URL=http://gotenberg:3000/forms/libreoffice/convert
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/tramites_municipales
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=yourpassword
    depends_on:
      - db
      - gotenberg
    volumes:
      - ./backend:/app

  gotenberg:
    image: gotenberg/gotenberg:8-alpine
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: tramites_municipales
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

