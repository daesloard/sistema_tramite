# Perfil local de desarrollo
app.pdf.allow-localhost-services=true
app.pdf.gotenberg.enabled=${APP_PDF_GOTENBERG_ENABLED:true}
app.pdf.gotenberg.url=${APP_PDF_GOTENBERG_URL:http://localhost:3000/forms/libreoffice/convert}
app.pdf.gotenberg.max-delay-ms=${APP_PDF_GOTENBERG_MAX_DELAY_MS:20000}
app.pdf.gotenberg.max-concurrent=${APP_PDF_GOTENBERG_MAX_CONCURRENT:1}
app.pdf.gotenberg.queue-timeout-seconds=${APP_PDF_GOTENBERG_QUEUE_TIMEOUT_SECONDS:30}
app.pdf.gotenberg.max-attempts=${APP_PDF_GOTENBERG_MAX_ATTEMPTS:7}
app.pdf.gotenberg.retry-delay-ms=${APP_PDF_GOTENBERG_RETRY_DELAY_MS:2000}
app.pdf.gotenberg.fallback-enabled=${APP_PDF_GOTENBERG_FALLBACK_ENABLED:true}
app.pdf.use-docx4j=${APP_PDF_USE_DOCX4J:true}
app.docxtemplater.enabled=${APP_DOCXTEMPLATER_ENABLED:true}
app.docxtemplater.url=${APP_DOCXTEMPLATER_URL:http://localhost:3001/render-docx}
app.docxtemplater.fallback-enabled=${APP_DOCXTEMPLATER_FALLBACK_ENABLED:true}

