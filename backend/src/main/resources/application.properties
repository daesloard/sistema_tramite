spring.application.name=backend
server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/tramites_municipales
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Límite de carga de archivos (coherente con validación de backend)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sistemas@cabuyaro-meta.gov.co
spring.mail.password=cqpa kiyy pidx ncri
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.starttls.will-retry=true
spring.mail.properties.mail.smtp.starttls.required=true
# Configuración SSL adicional deshabilitada para evitar dependencias de clase en runtime.
# Si se requiere ajuste de certificados en desarrollo, usar truststore de JVM.

# Conversión DOCX -> PDF
# En producción online debe permanecer en false (usa docx4j, sin dependencia de LibreOffice instalado).
# En local, puede activarse a true para mayor fidelidad visual si LibreOffice está instalado.
app.pdf.use-libreoffice=false

# Firma digital de PDF (si no se configura .p12, se usa certificado autofirmado temporal)
app.pdf.digital-sign.enabled=true
app.pdf.digital-sign.p12-path=
app.pdf.digital-sign.p12-password=
app.pdf.digital-sign.p12-alias=

