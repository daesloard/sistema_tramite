spring.application.name=backend
server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/tramites_municipales
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.jackson.time-zone=America/Bogota
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=4
spring.datasource.hikari.connection-timeout=20000

# Límite de carga de archivos (coherente con validación de backend)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sistemas@cabuyaro-meta.gov.co
spring.mail.password=cqpa kiyy pidx ncri
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.starttls.will-retry=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=sistemas@cabuyaro-meta.gov.co
app.mail.attachments.on-radicacion=false
app.mail.max-attempts=3
app.mail.retry-delay-ms=700
app.mail.send-rejected-result=false
app.mail.smtp.ssl.trust=*
app.storage.drive.enabled=false
app.storage.drive.credentials-json-base64=
app.storage.drive.folder-id=
# Configuración SSL adicional deshabilitada para evitar dependencias de clase en runtime.
# Si se requiere ajuste de certificados en desarrollo, usar truststore de JVM.

# Conversión DOCX -> PDF
# En producción online debe permanecer en false (usa docx4j, sin dependencia de LibreOffice instalado).
# En local, puede activarse a true para mayor fidelidad visual si LibreOffice está instalado.
app.pdf.use-libreoffice=true
# Forzar fuente Maven Pro en cada run del DOCX antes de convertir a PDF.
# Se recomienda false para preservar negritas/estilos originales de la plantilla.
app.pdf.enforce-maven-pro-font=false
# Ajustes manuales de espaciado sobre párrafos/tablas de la plantilla.
# Se recomienda false para conservar exactamente el diseño original del DOCX.
app.pdf.adjust-template-spacing=false
# Mostrar leyenda/hash de firma como texto visible en el documento (puede aumentar alto total).
app.pdf.signature-annotation.enabled=false

# Firma digital de PDF (si no se configura .p12, se usa certificado autofirmado temporal)
app.pdf.digital-sign.enabled=true
app.pdf.digital-sign.p12-path=
app.pdf.digital-sign.p12-password=
app.pdf.digital-sign.p12-alias=

# Web Push (navegador)
# Generar VAPID keys y configurarlas para habilitar push real desde backend.
app.webpush.enabled=${APP_WEBPUSH_ENABLED:false}
app.webpush.public-key=${APP_WEBPUSH_PUBLIC_KEY:}
app.webpush.private-key=${APP_WEBPUSH_PRIVATE_KEY:}
app.webpush.subject=${APP_WEBPUSH_SUBJECT:mailto:sistemas@cabuyaro-meta.gov.co}

# Observabilidad operacional
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

